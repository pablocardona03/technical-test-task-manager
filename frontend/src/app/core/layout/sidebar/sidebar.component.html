<aside class="sticky top-0 flex h-screen flex-col border-r border-slate-200 bg-slate-50 px-5 py-8">
  <div class="px-2">
    <div class="text-[1.55rem] font-semibold tracking-tight text-slate-900">Task Operations</div>
    <div class="mt-2 text-sm text-slate-500">Internal task and user management.</div>
  </div>

  <nav class="mt-10 space-y-2">
    @for (item of navItems; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="bg-slate-900 text-white shadow-sm"
        class="flex items-center rounded-2xl px-4 py-3 text-sm font-semibold text-slate-600 transition hover:bg-white hover:text-slate-900"
      >
        {{ item.label }}
      </a>
    }
  </nav>
</aside>
