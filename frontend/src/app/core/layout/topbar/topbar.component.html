<header class="border-b border-slate-200 bg-slate-50 px-4 py-4">
  <div>
    <div class="text-lg font-semibold text-slate-900">Task Operations</div>
    <div class="mt-1 text-sm text-slate-500">Simple, maintainable and functional.</div>
  </div>

  <nav class="mt-4 flex gap-2">
    @for (item of navItems; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="bg-slate-900 text-white"
        class="rounded-2xl px-4 py-2.5 text-sm font-semibold text-slate-600 transition hover:bg-white hover:text-slate-900"
      >
        {{ item.label }}
      </a>
    }
  </nav>
</header>
