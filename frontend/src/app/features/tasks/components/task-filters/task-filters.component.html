<form
  class="app-section"
  [formGroup]="form"
  (ngSubmit)="submit()"
>
  <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
    <div>
      <label class="app-label" for="status">Status</label>
      <select id="status" class="app-select" formControlName="status">
        <option value="">All statuses</option>
        @for (status of statusOptions; track status) {
          <option [value]="status">{{ status === 'InProgress' ? 'In Progress' : status }}</option>
        }
      </select>
    </div>

    <div>
      <label class="app-label" for="assignedUserId">Assigned user</label>
      <select id="assignedUserId" class="app-select" formControlName="assignedUserId">
        <option value="">All users</option>
        @for (user of users(); track user.id) {
          <option [value]="user.id">{{ user.name }}</option>
        }
      </select>
    </div>

    <div>
      <label class="app-label" for="priority">Priority</label>
      <select id="priority" class="app-select" formControlName="priority">
        <option value="">All priorities</option>
        @for (priority of priorityOptions; track priority) {
          <option [value]="priority">{{ priority }}</option>
        }
      </select>
    </div>

    <div>
      <label class="app-label" for="tag">Tag</label>
      <input id="tag" class="app-input" type="text" formControlName="tag" placeholder="Example: editorial" />
    </div>
  </div>

  <div class="mt-4 flex flex-wrap gap-3">
    <button type="submit" class="app-btn-primary">Apply filters</button>
    <button type="button" class="app-btn-secondary" (click)="reset()">Reset</button>
  </div>
</form>
