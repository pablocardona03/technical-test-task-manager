<div class="app-page">
  <app-page-header [title]="pageTitle()" [subtitle]="pageSubtitle()" backLink="/tasks" />

  @if (loadError()) {
    <app-error-state [message]="loadError()!" (retry)="reload()" />
  } @else {
    @if (saveError()) {
      <app-error-state [title]="isEditMode() ? 'Task could not be updated' : 'Task could not be created'" [message]="saveError()!" />
    }

    <app-task-form
      [users]="users()"
      [task]="task()"
      [submitting]="saving()"
      [submitLabel]="submitLabel()"
      (submitTask)="saveTask($event)"
    />
  }
</div>
