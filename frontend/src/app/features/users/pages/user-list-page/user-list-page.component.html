<div class="app-page">
  <app-page-header
    title="Users"
    subtitle="List the current users and review their roles in the task workflow."
    actionLabel="New user"
    actionLink="/users/new"
  />

  @if (error()) {
    <app-error-state [message]="error()!" (retry)="loadUsers()" />
  } @else if (loading()) {
    <div class="grid gap-4 md:grid-cols-2">
      @for (item of [1, 2, 3, 4]; track item) {
        <div class="app-section space-y-4">
          <div class="h-5 w-1/2 animate-pulse rounded bg-slate-200"></div>
          <div class="h-4 w-2/3 animate-pulse rounded bg-slate-100"></div>
          <div class="h-10 w-full animate-pulse rounded bg-slate-100"></div>
        </div>
      }
    </div>
  } @else if (!users().length) {
    <app-empty-state
      title="No users found"
      message="Create the first user to start assigning tasks."
      actionLabel="Create user"
      actionLink="/users/new"
    />
  } @else {
    <app-user-table [users]="users()" />
  }
</div>
