<div class="app-page">
  <app-page-header [title]="pageTitle()" [subtitle]="pageSubtitle()" backLink="/users" />

  @if (loadError()) {
    <app-error-state [message]="loadError()!" (retry)="reload()" />
  } @else {
    @if (saveError()) {
      <app-error-state [title]="isEditMode() ? 'User could not be updated' : 'User could not be created'" [message]="saveError()!" />
    }

    <app-user-form
      [user]="user()"
      [submitting]="loading()"
      [submitLabel]="submitLabel()"
      (submitUser)="saveUser($event)"
    />
  }
</div>
