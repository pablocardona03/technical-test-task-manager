<div class="rounded-3xl border border-dashed border-slate-300 bg-white p-8 text-center shadow-sm">
  <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-100 text-slate-500">
    ∅
  </div>
  <h2 class="mt-4 text-lg font-semibold text-slate-900">{{ title() }}</h2>
