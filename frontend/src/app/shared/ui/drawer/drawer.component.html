@if (open()) {
  <div class="fixed inset-0 z-40 bg-slate-950/30" (click)="close.emit()"></div>
  <aside
    class="fixed right-0 top-0 z-50 flex h-screen w-full max-w-xl flex-col border-l border-slate-200 bg-white shadow-2xl"
  >
    <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
      <div class="text-lg font-semibold text-slate-900">{{ title() }}</div>
      <button
        type="button"
        class="inline-flex h-9 w-9 items-center justify-center rounded-xl text-slate-500 transition hover:bg-slate-100 hover:text-slate-900"
        (click)="close.emit()"
      >
        ✕
      </button>
    </div>

    <div class="min-h-0 flex-1 overflow-y-auto p-5">
      <ng-content />
    </div>
  </aside>
}
